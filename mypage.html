<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ — CHARAMARL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FF8A00; --purple:#A855F7; --black:#1a1a26;
    --line:#e7e7ee; --muted:#8a8a97; --bg:#f7f7fa;
    --like:#e0245e;
    --tap-min:44px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--black);font-family:'M PLUS Rounded 1c','Helvetica Neue',Arial,sans-serif;padding-bottom:48px;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .logo{font-size:18px;font-weight:800;letter-spacing:.08em;text-decoration:none;}
  .logo .c1{color:var(--orange);} .logo .c2{color:var(--purple);}
  .back{color:var(--muted);text-decoration:none;font-size:12px;font-weight:700;min-height:var(--tap-min);display:inline-flex;align-items:center;}

  .wrap{max-width:640px;margin:0 auto;padding:20px 16px;}
  .profile{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .pfp{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--purple));color:#fff;font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .pname{font-size:20px;font-weight:800;}
  .pstat{font-size:12px;color:var(--muted);margin-top:2px;}
  .logout{margin-left:auto;min-height:var(--tap-min);padding:0 16px;background:#fff;border:1px solid var(--line);border-radius:22px;font-family:inherit;font-size:12px;font-weight:800;color:#555;cursor:pointer;}
  .logout:focus-visible{outline:3px solid var(--purple);outline-offset:1px;}

  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{min-height:var(--tap-min);padding:0 18px;display:inline-flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;font-size:13px;font-weight:800;color:#555;cursor:pointer;font-family:inherit;}
  .tab.on{background:var(--black);color:#fff;border-color:var(--black);}
  .tab:focus-visible{outline:3px solid var(--purple);outline-offset:1px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .item{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;text-decoration:none;color:var(--black);}
  .item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#eee;}
  .item .tt{font-size:12px;font-weight:800;padding:8px 10px 2px;line-height:1.4;}
  .item .badges{padding:0 10px 10px;font-size:11px;}
  .badges .b{margin-right:6px;}
  .badges .lk{color:var(--like);font-weight:800;}
  .badges .sv{color:var(--orange);font-weight:800;}

  .empty{text-align:center;padding:56px 20px;background:#fff;border:1px dashed var(--line);border-radius:22px;}
  .empty .ic{font-size:40px;}
  .empty .t{font-weight:800;font-size:15px;margin-top:10px;}
  .empty .s{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.7;}
  .empty a{display:inline-flex;align-items:center;justify-content:center;min-height:var(--tap-min);margin-top:14px;padding:0 24px;background:var(--orange);color:#fff;border-radius:24px;font-size:13px;font-weight:800;text-decoration:none;}

  .err{background:#FFC7CE;color:#9C0006;border-radius:14px;padding:12px 14px;font-size:12px;font-weight:700;margin-bottom:14px;display:none;}

  /* 作品投稿 */
  .sec-h{font-size:16px;font-weight:800;margin:28px 0 10px;}
  .post-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;}
  .fld label .opt{color:var(--muted);font-size:10px;font-weight:700;margin-left:4px;}
  .fld input[type=text],.fld input[type=url],.fld textarea{width:100%;min-height:var(--tap-min);padding:10px 14px;font-family:inherit;font-size:14px;font-weight:700;color:var(--black);background:#eef4ff;border:1.5px solid transparent;border-radius:13px;}
  .fld textarea{min-height:80px;resize:vertical;line-height:1.6;}
  .fld input:focus-visible,.fld textarea:focus-visible{outline:3px solid var(--purple);outline-offset:1px;}
  .drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:120px;border:2px dashed #c9d4ee;border-radius:16px;background:#f6f9ff;cursor:pointer;text-align:center;padding:12px;}
  .drop.has{border-style:solid;padding:0;overflow:hidden;min-height:0;}
  .drop img{max-width:100%;max-height:260px;display:block;}
  .drop .di{font-size:26px;} .drop .dt{font-size:12px;font-weight:800;color:#5b6b92;} .drop .ds{font-size:10px;color:var(--muted);}
  .post-btn{display:flex;align-items:center;justify-content:center;width:100%;min-height:48px;background:var(--orange);color:#fff;border:none;border-radius:26px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .12s;}
  .post-btn:active{transform:scale(.95);}
  .post-btn:focus-visible{outline:3px solid var(--purple);outline-offset:2px;}
  .post-btn[disabled]{opacity:.5;cursor:default;}
  .post-done{display:none;background:#e8f8ee;color:#1a7f4b;border-radius:14px;padding:12px 14px;font-size:12px;font-weight:800;margin-top:12px;}
  .mine-list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .mine{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;}
  .mine img{width:52px;height:52px;border-radius:10px;object-fit:cover;background:#eee;flex:0 0 auto;}
  .mine .mt{font-size:13px;font-weight:800;min-width:0;flex:1;}
  .mine .mt .ml{display:block;font-size:10px;color:var(--muted);font-weight:700;word-break:break-all;}
  .st{flex:0 0 auto;font-size:10px;font-weight:800;border-radius:9px;padding:4px 10px;}
  .st.pending{background:#fff3d6;color:#946200;} .st.approved{background:#e8f8ee;color:#1a7f4b;} .st.rejected{background:#f3f3f6;color:var(--muted);}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<header>
  <a class="logo" href="./index.html"><span class="c1">CHARA</span><span class="c2">MARL</span></a>
  <a class="back" href="./index.html">← サイトへ戻る</a>
</header>

<div class="wrap">
  <div class="err" id="err"></div>
  <div class="profile">
    <div class="pfp" id="pfp">🦖</div>
    <div>
      <div class="pname" id="pname">…</div>
      <div class="pstat"><span class="num" id="nLike">0</span> いいね ・ <span class="num" id="nSave">0</span> 保存</div>
    </div>
    <button class="logout" id="logout">ログアウト</button>
  </div>

  <div class="tabs">
    <button class="tab on" data-t="all">すべて</button>
    <button class="tab" data-t="like">♥ いいね</button>
    <button class="tab" data-t="save">🔖 保存</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>
    <div class="ic">🦕</div>
    <div class="t">まだコレクションがありません</div>
    <div class="s">ギャラリーで気になるアートに ♥ や 🔖 を付けると<br>ここに集まっていきます。</div>
    <a href="./index.html#discover">ギャラリーを見る →</a>
  </div>

  <div class="sec-h">🎨 作品を投稿する</div>
  <div class="post-card">
    <div class="fld">
      <div class="drop" id="drop" role="button" tabindex="0" aria-label="画像を選択">
        <span class="di">🖼️</span>
        <span class="dt">タップして画像を選択</span>
        <span class="ds">jpeg / png / webp・自動で縮小されます</span>
      </div>
      <input type="file" id="file" accept="image/jpeg,image/png,image/webp" hidden>
    </div>
    <div class="fld"><label for="pTitle">作品タイトル</label><input type="text" id="pTitle" maxlength="60" placeholder="例: MIDNIGHT ROAR"></div>
    <div class="fld"><label for="pLink">あなたのサイト / SNSリンク<span class="opt">任意・公開されます</span></label><input type="url" id="pLink" maxlength="300" placeholder="https://…（作品の「サイトにアクセス」ボタンの飛び先）">
      <div style="font-size:10px;color:var(--muted);margin-top:4px;">承認されると、このリンクとあなたのニックネームが作品と一緒にギャラリーで公開されます</div></div>
    <div class="fld"><label for="pDesc">作品の説明<span class="opt">任意</span></label><textarea id="pDesc" maxlength="500" placeholder="作品のコンセプトや制作エピソードなど"></textarea></div>
    <button class="post-btn" id="postBtn" type="button">審査に出す →</button>
    <div class="post-done" id="postDone">投稿を受け付けました！運営の承認後にギャラリーへ公開されます 🦖</div>
  </div>

  <div class="sec-h">📮 あなたの投稿</div>
  <div class="mine-list" id="mineList"><div class="empty" style="padding:24px;"><div class="s">まだ投稿はありません</div></div></div>
</div>

<script>
  // ギャラリー作品メタ（index.htmlのARTWORKSと同じID）
  const ART={
    roar:{img:'./img/gallery/gallery_roar.png',title:'ROAR!'},
    worldcup:{img:'./img/gallery/gallery_worldcup.png',title:'WORLD CUP EDITION'},
    '90s':{img:'./img/gallery/gallery_90s.png',title:'RETRO POP'},
    nodino:{img:'./img/gallery/gallery_nodino.png',title:'NO DINO NO LIFE'},
    costume:{img:'./img/gallery/gallery_costume.png',title:'COSTUME COLLECTION'},
    ahoyoung:{img:'./img/gallery/gallery_ahoyoung.png',title:'DinoRenny × ahoyoung'},
    sue:{img:'./img/colors_nobg/sue_red.png',title:'SUE'},
    putti:{img:'./img/colors_nobg/putti_yellow.png',title:'PUTTI'},
    mossun:{img:'./img/colors_nobg/mossun_blue.png',title:'MOSSUN'},
    gmc:{img:'./img/gallery/gmc.png',title:'レコマル'}
  };
  const $=id=>document.getElementById(id);
  let likes=[],saves=[],filter='all';

  function render(){
    const ids=[...new Set([...likes,...saves])].filter(id=>ART[id]).filter(id=>
      filter==='all'||(filter==='like'?likes.includes(id):saves.includes(id)));
    $('nLike').textContent=likes.filter(id=>ART[id]).length;
    $('nSave').textContent=saves.filter(id=>ART[id]).length;
    $('grid').innerHTML=ids.map(id=>`
      <a class="item" href="./index.html#discover">
        <img src="${ART[id].img}" alt="${ART[id].title}">
        <div class="tt">${ART[id].title}</div>
        <div class="badges">
          ${likes.includes(id)?'<span class="b lk">♥ いいね</span>':''}
          ${saves.includes(id)?'<span class="b sv">🔖 保存</span>':''}
        </div>
      </a>`).join('');
    $('empty').hidden=ids.length>0;
  }

  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');filter=t.dataset.t;render();
  }));

  $('logout').addEventListener('click',async()=>{
    await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'logout'})}).catch(()=>{});
    location.href='./index.html';
  });

  (async()=>{
    try{
      const d=await fetch('/api/auth').then(r=>r.json());
      if(!d.user){location.href='./login.html';return;}
      $('pname').textContent=d.user.name;
      $('pfp').textContent=d.user.name.slice(0,1).toUpperCase();
      // サーバーのコレクションとローカルをマージ → 双方に反映
      const g=k=>{try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return [];}};
      likes=[...new Set([...(d.likes||[]),...g('charamarl_art_likes')])];
      saves=[...new Set([...(d.saves||[]),...g('charamarl_art_saves')])];
      localStorage.setItem('charamarl_art_likes',JSON.stringify(likes));
      localStorage.setItem('charamarl_art_saves',JSON.stringify(saves));
      fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'sync',likes,saves})}).catch(()=>{});
      render();
      loadMine();
    }catch(e){
      $('err').textContent='読み込みに失敗しました。時間をおいてお試しください';
      $('err').style.display='block';
    }
  })();

  // 投稿ギャラリーの作品もコレクション表示の対象に
  fetch('/api/gallery').then(r=>r.ok?r.json():{list:[]}).then(d=>{
    (d.list||[]).forEach(a=>{if(!ART[a.id])ART[a.id]={img:a.img,title:a.title};});
    render();
  }).catch(()=>{});

  // ===== 作品を投稿する =====
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const drop=$('drop'), fileIn=$('file');
  let imgData=null;
  const dropDefault=drop.innerHTML;
  drop.addEventListener('click',()=>fileIn.click());
  drop.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fileIn.click();}});
  fileIn.addEventListener('change',()=>{
    const f=fileIn.files[0]; if(!f)return;
    const img=new Image();
    img.onload=()=>{
      const max=1600, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      const ctx=cv.getContext('2d');
      if(f.type==='image/png'){
        ctx.drawImage(img,0,0,cv.width,cv.height);
        imgData=cv.toDataURL('image/png');
        if(imgData.length>2800000){ // 大きすぎるPNGは白背景JPEGへ
          ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);ctx.drawImage(img,0,0,cv.width,cv.height);
          imgData=cv.toDataURL('image/jpeg',0.87);
        }
      }else{
        ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
        ctx.drawImage(img,0,0,cv.width,cv.height);
        imgData=cv.toDataURL('image/jpeg',0.87);
      }
      drop.classList.add('has');
      drop.innerHTML=`<img src="${imgData}" alt="選択した画像">`;
      URL.revokeObjectURL(img.src);
    };
    img.src=URL.createObjectURL(f);
  });

  function postErr(m){$('err').textContent=m;$('err').style.display='block';$('err').scrollIntoView({block:'center'});}
  $('postBtn').addEventListener('click',async()=>{
    $('err').style.display='none';$('postDone').style.display='none';
    const title=$('pTitle').value.trim();
    if(!imgData)return postErr('画像を選択してください');
    if(!title)return postErr('作品タイトルを入力してください');
    const btn=$('postBtn');btn.disabled=true;btn.textContent='送信中…';
    try{
      const r=await fetch('/api/gallery',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'submit',title,link:$('pLink').value.trim(),desc:$('pDesc').value.trim(),image:imgData})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok)throw new Error(d.error||'投稿に失敗しました');
      imgData=null;fileIn.value='';drop.classList.remove('has');drop.innerHTML=dropDefault;
      $('pTitle').value='';$('pLink').value='';$('pDesc').value='';
      $('postDone').style.display='block';
      loadMine();
    }catch(ex){postErr(ex.message==='Failed to fetch'?'通信に失敗しました。時間をおいてお試しください':ex.message);}
    btn.disabled=false;btn.textContent='審査に出す →';
  });

  async function loadMine(){
    try{
      const d=await fetch('/api/gallery?mine=1').then(r=>r.ok?r.json():{list:[]});
      const lbl={pending:'審査待ち',approved:'公開中',rejected:'見送り'};
      if(d.list&&d.list.length){
        $('mineList').innerHTML=d.list.map(a=>
          `<div class="mine"><img src="${esc(a.img)}" alt=""><div class="mt">${esc(a.title)}${a.link?`<span class="ml">🔗 ${esc(a.link)}</span>`:''}</div><span class="st ${esc(a.status)}">${lbl[a.status]||esc(a.status)}</span></div>`).join('');
      }
    }catch(e){}
  }
</script>
</body>
</html>
