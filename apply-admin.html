<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>応募一覧 — CHARAMARL 運営</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FF8A00; --purple:#A855F7; --black:#1a1a26;
    --line:#e7e7ee; --muted:#8a8a97; --bg:#f7f7fa;
    --tap-min:44px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--black);font-family:'M PLUS Rounded 1c','Helvetica Neue',Arial,sans-serif;padding-bottom:48px;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .logo{font-size:18px;font-weight:800;letter-spacing:.08em;text-decoration:none;}
  .logo .c1{color:var(--orange);} .logo .c2{color:var(--purple);}
  .back{color:var(--muted);text-decoration:none;font-size:12px;font-weight:700;min-height:var(--tap-min);display:inline-flex;align-items:center;}

  .wrap{max-width:640px;margin:0 auto;padding:20px 16px;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--orange);text-transform:uppercase;}
  h1{font-size:22px;font-weight:800;margin:2px 0 4px;}
  .sub{font-size:12px;color:var(--muted);margin-bottom:18px;}
  .sub b{color:var(--black);}

  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;}
  .card .nm{font-size:15px;font-weight:800;}
  .card .genre{display:inline-block;font-size:10px;font-weight:800;color:var(--purple);background:#f3e9ff;border-radius:9px;padding:3px 9px;margin-left:8px;vertical-align:middle;}
  .card .ts{font-size:10px;color:var(--muted);margin-top:2px;}
  .card .ln{font-size:12px;margin-top:8px;word-break:break-all;}
  .card .ln a{color:var(--purple);font-weight:700;}
  .card .msg{font-size:12px;line-height:1.8;margin-top:8px;background:var(--bg);border-radius:12px;padding:10px 12px;white-space:pre-wrap;}

  .empty{text-align:center;padding:56px 20px;background:#fff;border:1px dashed var(--line);border-radius:22px;color:var(--muted);font-size:13px;font-weight:700;}
  .err{background:#FFC7CE;color:#9C0006;border-radius:14px;padding:12px 14px;font-size:12px;font-weight:700;margin-bottom:14px;display:none;}
  .refresh{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:var(--tap-min);margin:20px 0 6px;background:var(--orange);color:#fff;border:none;border-radius:26px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .12s;}
  .refresh:active{transform:scale(.95);}
  .refresh:focus-visible{outline:3px solid var(--purple);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<header>
  <a class="logo" href="./index.html"><span class="c1">CHARA</span><span class="c2">MARL</span></a>
  <a class="back" href="./stats.html">📊 ダッシュボード</a>
</header>

<div class="wrap">
  <div class="eyebrow">Admin</div>
  <h1>クリエイター応募一覧</h1>
  <p class="sub">全 <b class="num" id="count">-</b> 件（新しい順）</p>

  <div class="err" id="err"></div>
  <div id="list"></div>

  <button class="refresh" id="refresh">↻ 一覧を更新する</button>
</div>

<script>
  const key=new URLSearchParams(location.search).get('key')||'';
  const list=document.getElementById('list'), err=document.getElementById('err');
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmt=ts=>new Date(ts).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  async function load(){
    err.style.display='none';
    try{
      const r=await fetch('/api/apply?key='+encodeURIComponent(key));
      if(r.status===403)throw new Error('閲覧キーが違います。URLの ?key= を確認してください');
      if(!r.ok)throw new Error('読み込みに失敗しました ('+r.status+')');
      const d=await r.json();
      document.getElementById('count').textContent=d.count;
      if(!d.list.length){list.innerHTML='<div class="empty">まだ応募はありません 🦖</div>';return;}
      list.innerHTML=d.list.map(a=>{
        const url=/^https?:\/\//.test(a.sns)?a.sns:(a.sns?'https://'+a.sns:'');
        return `<div class="card">
          <div class="nm">${esc(a.name)}${a.genre?`<span class="genre">${esc(a.genre)}</span>`:''}</div>
          <div class="ts">${fmt(a.ts)}</div>
          ${a.sns?`<div class="ln">🔗 <a href="${esc(url)}" target="_blank" rel="noopener nofollow">${esc(a.sns)}</a></div>`:''}
          ${a.email?`<div class="ln">✉️ <a href="mailto:${esc(a.email)}">${esc(a.email)}</a></div>`:''}
          ${a.message?`<div class="msg">${esc(a.message)}</div>`:''}
        </div>`;
      }).join('');
    }catch(ex){
      err.textContent=ex.message;err.style.display='block';
      list.innerHTML='';document.getElementById('count').textContent='-';
    }
  }
  document.getElementById('refresh').addEventListener('click',load);
  load();
</script>
</body>
</html>
