<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購入をキャンセルしました — CHARAMARL</title>
<style>
  :root { --bg:#111118; --accent:#f5c842; --accent2:#a259ff; --text:#f0f0f0; --muted:#777; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap { text-align:center; padding:40px 24px; max-width:480px; }
  .icon { font-size:72px; margin-bottom:24px; }
  h1 { font-size:28px; font-weight:900; margin-bottom:12px; }
  p { color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:32px; }
  .btn {
    display:inline-block; background:var(--accent); color:#111;
    font-weight:900; font-size:14px; padding:14px 36px;
    border-radius:32px; text-decoration:none; letter-spacing:.06em;
  }
  .logo {
    font-size:18px; font-weight:900; letter-spacing:.1em; margin-bottom:40px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">CHARAMARL</div>
  <div class="icon">🛒</div>
  <h1>購入をキャンセルしました</h1>
  <p>またいつでもお気軽にご利用ください。</p>
  <a class="btn" href="/index.html">ショップに戻る</a>
</div>
</body>
</html>
